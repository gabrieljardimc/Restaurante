server:
  port: 8080

spring:
  application:
    name: restaurante

  datasource:
    url: jdbc:mysql://localhost:3306/restaurante?createDatabaseIfNotExist=true
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: create-drop

    show-sql: true

    properties:
      hibernate:
        format_sql: true